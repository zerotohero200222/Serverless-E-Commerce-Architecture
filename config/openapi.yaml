swagger: "2.0"
info:
  title: "ecommerce-api"
  description: "Managed API Gateway routing to Cloud Run backends"
  version: "1.0.0"

schemes:
  - "https"
  - "http"

produces:
  - "application/json"

securityDefinitions:
  api_key:
    type: "apiKey"
    name: "x-api-key"
    in: "header"

security:
  - api_key:

paths:
  /api/products:
    get:
      summary: "Retrieve product catalog"
      operationId: "getProducts"
      x-google-backend:
        address: "${product_url}"
        path_translation: "APPEND_PATH_TO_ADDRESS"
      responses:
        "200":
          description: "Successful response"
        "401":
          description: "Unauthorized - Invalid API Key"

  /api/inventory:
    get:
      summary: "Retrieve inventory status"
      operationId: "getInventory"
      x-google-backend:
        address: "${inventory_url}"
        path_translation: "APPEND_PATH_TO_ADDRESS"
      responses:
        "200":
          description: "Successful response"
