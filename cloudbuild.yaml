##############################################################################
# cloudbuild.yaml — Ecommerce Platform CI/CD Pipeline
#
# PHASE 0 — Create Artifact Registry repo (parallel with builds)
# PHASE 1 — Docker build + push (4 services)
# PHASE 2 — Terraform init → validate → plan → apply
# PHASE 3 — Smoke test
#
# Required trigger substitution variables:
#   _TF_STATE_BUCKET, _PROJECT_ID, _REGION, _ENV, _APP_NAME, _AR_REPO
##############################################################################

substitutions:
  _REGION: "us-central1"
  _ENV: "dev"
  _APP_NAME: "ecommerce"
  _AR_REPO: "ecommerce-images"

options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true

steps:

# ════════════════════════════════════════════════════════════════════════════
# PHASE 0 — Create Artifact Registry repo before any push happens
# Runs in parallel with Docker builds to save time.
# Uses || true so it is idempotent — safe when repo already exists.
# ════════════════════════════════════════════════════════════════════════════

  - id: "create-ar-repo"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    waitFor: ["-"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud artifacts repositories create $_AR_REPO \
          --repository-format=docker \
          --location=$_REGION \
          --project=$_PROJECT_ID \
          --description="Ecommerce microservice images" || true
        echo "✅ Artifact Registry repo ready: $_AR_REPO"

# ════════════════════════════════════════════════════════════════════════════
# PHASE 1 — Build & Push container images
# All 4 builds start immediately in parallel.
# Each push waits for its own build + create-ar-repo (so repo exists first).
# ════════════════════════════════════════════════════════════════════════════

  - id: "build-product"
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["-"]
    args:
      - build
      - --tag
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/product-service:$SHORT_SHA"
      - --tag
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/product-service:latest"
      - --cache-from
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/product-service:latest"
      - --file
      - "services/product-service/Dockerfile"
      - "services/product-service"

  - id: "build-order"
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["-"]
    args:
      - build
      - --tag
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/order-service:$SHORT_SHA"
      - --tag
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/order-service:latest"
      - --cache-from
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/order-service:latest"
      - --file
      - "services/order-service/Dockerfile"
      - "services/order-service"

  - id: "build-inventory"
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["-"]
    args:
      - build
      - --tag
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/inventory-service:$SHORT_SHA"
      - --tag
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/inventory-service:latest"
      - --cache-from
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/inventory-service:latest"
      - --file
      - "services/inventory-service/Dockerfile"
      - "services/inventory-service"

  - id: "build-frontend"
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["-"]
    args:
      - build
      - --tag
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/frontend-service:$SHORT_SHA"
      - --tag
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/frontend-service:latest"
      - --cache-from
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/frontend-service:latest"
      - --file
      - "services/frontend-service/Dockerfile"
      - "services/frontend-service"

  # Each push waits for BOTH its build AND the AR repo to be ready
  - id: "push-product"
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["build-product", "create-ar-repo"]
    args:
      - push
      - --all-tags
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/product-service"

  - id: "push-order"
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["build-order", "create-ar-repo"]
    args:
      - push
      - --all-tags
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/order-service"

  - id: "push-inventory"
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["build-inventory", "create-ar-repo"]
    args:
      - push
      - --all-tags
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/inventory-service"

  - id: "push-frontend"
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["build-frontend", "create-ar-repo"]
    args:
      - push
      - --all-tags
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/frontend-service"

# ════════════════════════════════════════════════════════════════════════════
# PHASE 2 — Terraform: init → validate → plan → apply
# ════════════════════════════════════════════════════════════════════════════

  - id: "tf-init"
    name: "hashicorp/terraform:1.6"
    waitFor:
      - "push-product"
      - "push-order"
      - "push-inventory"
      - "push-frontend"
    entrypoint: "terraform"
    args:
      - init
      - -backend-config=bucket=$_TF_STATE_BUCKET
      - -backend-config=prefix=$_APP_NAME/$_ENV/terraform.tfstate
      - -input=false
    dir: "infra"

  - id: "tf-validate"
    name: "hashicorp/terraform:1.6"
    waitFor: ["tf-init"]
    entrypoint: "terraform"
    args:
      - validate
    dir: "infra"

  - id: "tf-plan"
    name: "hashicorp/terraform:1.6"
    waitFor: ["tf-validate"]
    entrypoint: "terraform"
    args:
      - plan
      - -input=false
      - -out=tfplan
      - -var=project_id=$_PROJECT_ID
      - -var=region=$_REGION
      - -var=env=$_ENV
      - -var=product_image_tag=$SHORT_SHA
      - -var=order_image_tag=$SHORT_SHA
      - -var=inventory_image_tag=$SHORT_SHA
      - -var=frontend_image_tag=$SHORT_SHA
    dir: "infra"

  - id: "tf-apply"
    timeout: "3000s"
    name: "hashicorp/terraform:1.6"
    waitFor: ["tf-plan"]
    entrypoint: "terraform"
    args:
      - apply
      - -input=false
      - -auto-approve
      - tfplan
    dir: "infra"

# ════════════════════════════════════════════════════════════════════════════
# PHASE 3 — Smoke test
# ════════════════════════════════════════════════════════════════════════════

  - id: "smoke-test"
    name: "hashicorp/terraform:1.6"
    waitFor: ["tf-apply"]
    entrypoint: "sh"
    args:
      - "-c"
      - |
        set -e
        cd infra
        LB_IP=$$(terraform output -raw load_balancer_ip)
        echo "Load Balancer IP: $$LB_IP"

        apk add --no-cache curl > /dev/null 2>&1

        MAX_RETRIES=20
        SLEEP_SECONDS=15
        attempt=1

        until curl -sf --max-time 10 "http://$$LB_IP/" > /dev/null; do
          if [ $$attempt -ge $$MAX_RETRIES ]; then
            echo "ERROR: LB did not become healthy after $$(($$MAX_RETRIES * $$SLEEP_SECONDS))s"
            exit 1
          fi
          echo "Attempt $$attempt/$$MAX_RETRIES — waiting $${SLEEP_SECONDS}s..."
          sleep $$SLEEP_SECONDS
          attempt=$$(($$attempt + 1))
        done

        echo "✅ Frontend healthy at http://$$LB_IP/"

        for ROUTE in products orders inventory; do
          HTTP_CODE=$$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://$$LB_IP/api/$$ROUTE")
          if [ "$$HTTP_CODE" = "200" ]; then
            echo "✅ /api/$$ROUTE → HTTP $$HTTP_CODE"
          else
            echo "⚠️  /api/$$ROUTE → HTTP $$HTTP_CODE (may need warm-up)"
          fi
        done

        echo ""
        echo "════════════════════════════════════════════════"
        echo "  DEPLOYMENT COMPLETE"
        echo "  Frontend : http://$$LB_IP/"
        echo "  Products : http://$$LB_IP/api/products"
        echo "  Orders   : http://$$LB_IP/api/orders"
        echo "  Inventory: http://$$LB_IP/api/inventory"
        echo "════════════════════════════════════════════════"

images:
  - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/product-service:$SHORT_SHA"
  - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/order-service:$SHORT_SHA"
  - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/inventory-service:$SHORT_SHA"
  - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_AR_REPO/frontend-service:$SHORT_SHA"

timeout: "3600s"
